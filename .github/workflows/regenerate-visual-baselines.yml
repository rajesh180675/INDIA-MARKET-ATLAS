# Regenerate visual regression baselines on Linux (matches CI environment).
# Run manually from the Actions tab when intentional UI changes invalidate the
# committed baselines. The workflow runs `--update-snapshots` and pushes the
# refreshed PNGs back to the branch.

name: regenerate-visual-baselines

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update baselines on"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npx vite build

      - name: Regenerate visual baselines
        env:
          RUN_VISUAL: "1"
        run: npx playwright test tests/e2e/visual.spec.ts --update-snapshots

      - name: Commit and push refreshed baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No baseline changes."
            exit 0
          fi
          git commit -m "chore: regenerate visual baselines on linux

          Auto-regenerated by regenerate-visual-baselines workflow."
          git push origin HEAD:${{ inputs.branch }}
